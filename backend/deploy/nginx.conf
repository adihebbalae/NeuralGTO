# ─────────────────────────────────────────────────────────────────────────
# backend/deploy/nginx.conf — Nginx reverse proxy for NeuralGTO API
#
# Alternative to Cloudflare Tunnel for SSL termination.
# Use this if you have a domain pointed to the Oracle VM's public IP.
#
# Prerequisites:
#   sudo apt install -y nginx certbot python3-certbot-nginx
#   # Replace api.your-domain.com with your actual subdomain:
#   sudo certbot --nginx -d api.your-domain.com
#
# After certbot runs it will modify this file automatically (or manage its
# own config).  Copy this file to /etc/nginx/sites-available/neuralgto
# and symlink: sudo ln -s /etc/nginx/sites-available/neuralgto \
#                          /etc/nginx/sites-enabled/
# ─────────────────────────────────────────────────────────────────────────

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name api.your-domain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.your-domain.com;

    # ── SSL (managed by certbot — do not edit manually) ───────────────────
    ssl_certificate     /etc/letsencrypt/live/api.your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.your-domain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ─────────────────────────────────────────────────
    add_header X-Frame-Options          DENY        always;
    add_header X-Content-Type-Options   nosniff     always;
    add_header Referrer-Policy          strict-origin-when-cross-origin always;

    # ── CORS ──────────────────────────────────────────────────────────────
    # FastAPI CORSMiddleware (app/main.py) already sends the correct
    # Access-Control-Allow-* headers.  Do NOT duplicate them here —
    # duplicate CORS headers cause browsers to reject credentialed requests.

    location / {
        # Pre-flight
        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Generous timeouts for long-running solver calls
        proxy_read_timeout  420s;   # pro-mode solver can take up to 360s
        proxy_send_timeout  420s;
        proxy_connect_timeout 10s;

        # Buffer settings for streaming responses (future use)
        proxy_buffering    off;
    }

    # ── Health check (no auth required) ─────────────────────────────────
    location /api/health {
        proxy_pass http://127.0.0.1:8000/api/health;
    }
}
